<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Heatmap cubo estilo neuromarketing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('click-heatmap', {
      schema: {
        size: { type: 'int', default: 512 },
        pointRadius: { type: 'number', default: 45 }
      },

      init: function () {
        const size = this.data.size;

        this.canvas = document.createElement('canvas');
        this.canvas.width = size;
        this.canvas.height = size;
        this.ctx = this.canvas.getContext('2d');

        this.ctx.fillStyle = '#bdbdbd';
        this.ctx.fillRect(0, 0, size, size);

        this.texture = new THREE.CanvasTexture(this.canvas);
        this.texture.needsUpdate = true;

        this.onClick = this.onClick.bind(this);
        this.applyTexture = this.applyTexture.bind(this);

        this.el.addEventListener('loaded', this.applyTexture);
        this.el.addEventListener('click', this.onClick);
      },

      applyTexture: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;

        mesh.traverse(node => {
          if (node.isMesh && node.material) {
            if (Array.isArray(node.material)) {
              node.material.forEach(mat => {
                mat.map = this.texture;
                mat.needsUpdate = true;
              });
            } else {
              node.material.map = this.texture;
              node.material.needsUpdate = true;
            }
          }
        });
      },

      onClick: function (evt) {
        const intersection = evt.detail.intersection;
        if (!intersection || !intersection.uv) return;

        const uv = intersection.uv;
        const w = this.canvas.width;
        const h = this.canvas.height;

        const x = uv.x * w;
        const y = (1 - uv.y) * h;

        this.addHeatPoint(x, y);
        this.texture.needsUpdate = true;
      },

      addHeatPoint: function (x, y) {
        const ctx = this.ctx;
        const r = this.data.pointRadius;

        const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
        grd.addColorStop(0.00, 'rgba(255,255,255,0.95)');
        grd.addColorStop(0.12, 'rgba(255,0,0,0.95)');
        grd.addColorStop(0.28, 'rgba(255,128,0,0.90)');
        grd.addColorStop(0.45, 'rgba(255,255,0,0.82)');
        grd.addColorStop(0.62, 'rgba(0,255,0,0.68)');
        grd.addColorStop(0.78, 'rgba(0,255,255,0.50)');
        grd.addColorStop(1.00, 'rgba(0,0,255,0.22)');

        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  </script>
</head>

<body>
  <a-scene background="color: #d9d9d9">
    <a-entity light="type: ambient; intensity: 1.3"></a-entity>
    <a-entity light="type: directional; intensity: 1.1" position="1 2 1"></a-entity>

    <a-entity position="0 1.6 0">
      <a-camera>
        <a-cursor rayOrigin="mouse"></a-cursor>
      </a-camera>
    </a-entity>

    <a-box
      position="0 1.5 -3"
      rotation="0 30 0"
      depth="1.2"
      height="1.2"
      width="1.2"
      click-heatmap="size: 512; pointRadius: 45">
    </a-box>
  </a-scene>
</body>
</html>
